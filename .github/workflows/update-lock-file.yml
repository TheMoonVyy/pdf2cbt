name: Update pnpm lockfile

on:
  workflow_dispatch:

jobs:
  update-lockfile:
    name: Update pnpm-lock.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: pnpm

      - name: Update lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --staged --quiet; then
            echo "pnpm-lock.yaml is already up to date. Nothing to commit."
            exit 0
          fi
          BRANCH="chore/update-pnpm-lockfile"
          git checkout -b "$BRANCH"
          git commit -m "chore: update pnpm-lock.yaml"
          git push -f origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update pnpm-lock.yaml" \
            --body "Automated update of \`pnpm-lock.yaml\` triggered via workflow dispatch." \
            || echo "PR already exists, skipping creation."
